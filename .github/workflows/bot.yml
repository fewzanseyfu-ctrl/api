name: Run Telegram Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/15 * * * *' # Automatically restarts the bot if it closes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install python-telegram-bot==21.1.1 google-generativeai==0.5.2

    - name: Execute Bot Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py
